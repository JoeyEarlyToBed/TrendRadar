<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=project_page_kuka_v3.html">
<title>TrendRadar · AI 舆情监控</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0a0a0c;
  color: #e8e8ec;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
.logo {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #F15A24, #c6481d);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: white;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}
h1 {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #F15A24, #ff8c5a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
p {
  color: #888894;
  font-size: 14px;
}
.loader {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(241, 90, 36, 0.2);
  border-top-color: #F15A24;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
a {
  color: #F15A24;
  text-decoration: none;
  font-size: 14px;
  padding: 10px 24px;
  border: 1px solid rgba(241, 90, 36, 0.3);
  border-radius: 8px;
  transition: all 0.3s;
}
a:hover {
  background: rgba(241, 90, 36, 0.1);
  border-color: #F15A24;
}
</style>
</head>
<body>
  <div class="logo">TR</div>
  <h1>TrendRadar</h1>
  <p>AI 舆情情报雷达 · KUKA 质量数字化</p>
  <div class="loader"></div>
  <p>正在跳转至项目主页...</p>
  <a href="project_page_kuka_v3.html">手动进入 →</a>
  <script>
    setTimeout(function() {
      window.location.href = 'project_page_kuka_v3.html';
    }, 1500);
  </script>
</body>
</html>
