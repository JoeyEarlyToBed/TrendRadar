<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendRadar · 报告中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--card:#111827;--border:#1e293b;--accent:#6366f1;--accent2:#818cf8;--text:#e2e8f0;--dim:#64748b;--new:#ef4444;--glass:rgba(17,24,39,.7)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(99,102,241,.2)}50%{box-shadow:0 0 40px rgba(99,102,241,.4)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── header ── */
.header{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#a855f7);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;animation:glow 3s ease infinite}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo-sub{font-size:12px;color:var(--dim);margin-left:4px}

/* ── view tabs ── */
.view-tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border)}
.view-tab{padding:6px 16px;border-radius:8px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.view-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.4)}
.view-tab:hover:not(.active){color:var(--text)}

/* ── date filter ── */
.date-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:12px;transition:all .2s}
.date-chip.active{border-color:var(--accent);color:var(--accent2);background:rgba(99,102,241,.1)}
.date-chip:hover:not(.active){border-color:var(--dim)}

/* ── main ── */
.main{max-width:1400px;margin:0 auto;padding:24px}

/* ── stats bar ── */
.stats-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;transition:all .3s}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-num{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:12px;color:var(--dim);margin-top:2px}

/* ── matrix view ── */
.matrix-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s;animation:fadeUp .5s ease both}
.report-card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--accent);box-shadow:0 20px 60px rgba(99,102,241,.2)}
.card-head{padding:20px 20px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.card-date{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card-time{font-size:13px;color:var(--dim);margin-top:4px}
.card-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;animation:pulse 2s infinite}
.badge-new{background:rgba(239,68,68,.15);color:var(--new);border:1px solid rgba(239,68,68,.3)}
.badge-date{background:rgba(99,102,241,.1);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}
.card-body{padding:0 20px 16px}
.card-preview{list-style:none}
.card-preview li{font-size:13px;color:var(--dim);padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;transition:all .2s}
.card-preview li:hover{color:var(--text)}
.card-preview li:last-child{border:none}
.card-preview .rank{color:var(--accent);font-weight:600;font-size:11px;min-width:18px}
.card-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;background:rgba(99,102,241,.1);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}
.card-action{font-size:12px;color:var(--accent);font-weight:500;transition:all .2s}
.report-card:hover .card-action{transform:translateX(4px)}

/* ── carousel view ── */
.carousel-wrap{position:relative;margin:0 auto;max-width:1200px}
.carousel-container{overflow:hidden;border-radius:20px;border:1px solid var(--border);background:var(--card)}
.carousel-track{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.carousel-slide{min-width:100%;opacity:0;transition:opacity .4s ease;position:absolute;left:0;top:0}
.carousel-slide.active{opacity:1;position:relative}
.slide-content{background:var(--card);min-height:600px;display:flex;flex-direction:column}
.slide-header{padding:24px 32px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(168,85,247,.1))}
.slide-date{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.slide-time{font-size:16px;color:var(--dim)}
.slide-newest{color:var(--new);font-size:14px;font-weight:600;margin-left:8px}
.slide-body{flex:1;padding:0;overflow:hidden}
.slide-body iframe{width:100%;height:520px;border:none;background:#fff}
.carousel-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:24px}
.carousel-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.carousel-btn:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.1);box-shadow:0 4px 20px rgba(99,102,241,.3)}
.carousel-dots{display:flex;gap:10px;align-items:center}
.carousel-dot{width:10px;height:10px;border-radius:50%;background:var(--dim);cursor:pointer;transition:all .3s}
.carousel-dot.active{background:var(--accent);width:32px;border-radius:5px}
.carousel-dot:hover:not(.active){background:var(--accent2)}
.carousel-counter{font-size:14px;color:var(--dim);font-weight:500}

/* ── timeline view ── */
.timeline{position:relative;padding-left:50px}
.timeline::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--border))}
.timeline-group{margin-bottom:40px;position:relative;animation:fadeUp .5s ease both}
.timeline-group::before{content:'';position:absolute;left:-38px;top:8px;width:16px;height:16px;border-radius:50%;background:var(--accent);border:4px solid var(--bg);z-index:1;box-shadow:0 0 0 4px rgba(99,102,241,.2)}
.timeline-group:hover::before{transform:scale(1.2);box-shadow:0 0 0 8px rgba(99,102,241,.3)}
.timeline-date-label{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--accent2);display:flex;align-items:center;gap:8px}
.timeline-date-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.timeline-cards{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory}
.timeline-card{min-width:300px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s;scroll-snap-align:start}
.timeline-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 12px 40px rgba(99,102,241,.15)}
.timeline-card .t-time{font-size:14px;color:var(--accent2);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.timeline-card .t-preview{font-size:13px;color:var(--dim);line-height:1.7}
.timeline-card .t-preview-item{padding:4px 0;border-bottom:1px solid var(--border)}
.timeline-card .t-preview-item:last-child{border:none}

/* ── empty state ── */
.empty{text-align:center;padding:100px 20px;color:var(--dim)}
.empty-icon{font-size:64px;margin-bottom:20px;animation:pulse 3s ease infinite}
.empty-title{font-size:20px;font-weight:600;margin-bottom:8px;color:var(--text)}
.empty-desc{font-size:14px}

/* ── modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);opacity:0;transition:opacity .3s ease}
.modal-overlay.show{display:flex;opacity:1}
.modal{width:92%;max-width:1200px;height:90vh;background:var(--card);border-radius:24px;overflow:hidden;border:1px solid var(--border);display:flex;flex-direction:column;transform:scale(.9);transition:transform .3s ease}
.modal-overlay.show .modal{transform:scale(1)}
.modal-head{padding:20px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(99,102,241,.05),rgba(168,85,247,.05))}
.modal-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
.modal-title::before{content:'📊';font-size:20px}
.modal-close{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--text);border-color:var(--dim);background:rgba(255,255,255,.05)}
.modal-body{flex:1;overflow:hidden}
.modal-body iframe{width:100%;height:100%;border:none;background:#fff}

/* ── loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:80px 20px;gap:12px;color:var(--dim)}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── responsive ── */
@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .matrix-grid{grid-template-columns:1fr}
  .stats-bar{flex-direction:column}
  .carousel-btn{width:40px;height:40px;font-size:14px}
  .slide-body iframe{height:400px}
  .slide-date{font-size:20px}
  .timeline{padding-left:30px}
  .timeline::before{left:10px}
  .timeline-group::before{left:-28px;width:12px;height:12px}
  .timeline-card{min-width:260px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">TR</div>
      <div>
        <div class="logo-text">TrendRadar<span class="logo-sub">报告中心</span></div>
      </div>
    </div>
    <div class="view-tabs">
      <button class="view-tab active" data-view="matrix">▦ 矩阵</button>
      <button class="view-tab" data-view="carousel">◇ 轮播</button>
      <button class="view-tab" data-view="timeline">⏐ 时间线</button>
    </div>
    <div class="date-filter" id="dateFilter"></div>
  </div>
</div>

<div class="main">
  <div class="stats-bar" id="statsBar"></div>
  <div id="viewContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      <span>加载报告中...</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">报告详情</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modalIframe" src=""></iframe>
    </div>
  </div>
</div>

<script>
const REPORTS_BASE = 'reports/';
let allReports = [];
let currentIndex = 0;
let autoPlayInterval = null;

async function loadReports() {
  try {
    const res = await fetch(REPORTS_BASE + 'index.json');
    const data = await res.json();
    allReports = data.reports || [];
  } catch(e) {
    console.warn('无法加载 index.json，使用备用数据');
    allReports = [
      {id:'2026-06-16-22-09',filename:'22-09.html',date:'2026-06-16',time:'22:09',title:'22:09 趋势报告',keywords:['热点','趋势'],preview:[],isNewest:true},
      {id:'2026-06-16-21-35',filename:'21-35.html',date:'2026-06-16',time:'21:35',title:'21:35 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-21-03',filename:'21-03.html',date:'2026-06-16',time:'21:03',title:'21:03 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-20-38',filename:'20-38.html',date:'2026-06-16',time:'20:38',title:'20:38 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-20-29',filename:'20-29.html',date:'2026-06-16',time:'20:29',title:'20:29 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-19-57',filename:'19-57.html',date:'2026-06-16',time:'19:57',title:'19:57 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-16-58',filename:'16-58.html',date:'2026-06-16',time:'16:58',title:'16:58 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-16-04',filename:'16-04.html',date:'2026-06-16',time:'16:04',title:'16:04 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-15-22',filename:'15-22.html',date:'2026-06-16',time:'15:22',title:'15:22 趋势报告',keywords:['热点','趋势'],preview:[]},
      {id:'2026-06-16-15-16',filename:'15-16.html',date:'2026-06-16',time:'15:16',title:'15:16 趋势报告',keywords:['热点','趋势'],preview:[]},
    ];
  }
  renderStats();
  renderDateFilter();
  renderView();
}

function getDates() {
  const dates = [...new Set(allReports.map(r => r.date))];
  return dates.sort().reverse();
}

function renderStats() {
  const dates = getDates();
  const newest = allReports.find(r => r.isNewest);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${allReports.length}</div><div class="stat-label">总报告数</div></div>
    <div class="stat-card"><div class="stat-num">${dates.length}</div><div class="stat-label">覆盖天数</div></div>
    <div class="stat-card"><div class="stat-num">${newest ? newest.time : '--'}</div><div class="stat-label">最新报告</div></div>
    <div class="stat-card"><div class="stat-num">${dates[0] || '--'}</div><div class="stat-label">最近日期</div></div>
  `;
}

function renderDateFilter() {
  const dates = getDates();
  const container = document.getElementById('dateFilter');
  container.innerHTML = `<button class="date-chip active" data-date="all">全部</button>` +
    dates.map(d => `<button class="date-chip" data-date="${d}">${d.slice(5)}</button>`).join('');
  container.querySelectorAll('.date-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.date-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderView(btn.dataset.date);
    });
  });
}

function getFilteredReports(dateFilter) {
  if (!dateFilter || dateFilter === 'all') return allReports;
  return allReports.filter(r => r.date === dateFilter);
}

let currentView = 'matrix';
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    const activeDate = document.querySelector('.date-chip.active')?.dataset.date || 'all';
    renderView(activeDate);
  });
});

function renderView(dateFilter) {
  const reports = getFilteredReports(dateFilter);
  const container = document.getElementById('viewContainer');
  if (!reports.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-title">暂无报告数据</div>
        <div class="empty-desc">该日期范围内没有生成报告</div>
      </div>`;
    return;
  }
  if (currentView === 'matrix') renderMatrix(container, reports);
  else if (currentView === 'carousel') renderCarousel(container, reports);
  else renderTimeline(container, reports);
}

/* ── matrix ── */
function renderMatrix(container, reports) {
  container.innerHTML = '<div class="matrix-grid">' + reports.map((r, i) => `
    <div class="report-card" style="animation-delay:${i * 0.06}s" onclick="openReport('${r.filename}','${r.date} ${r.time}')">
      <div class="card-head">
        <div>
          <div class="card-date">📅 ${r.date}</div>
          <div class="card-time">⏰ ${r.time}</div>
        </div>
        ${r.isNewest ? '<span class="card-badge badge-new">● 最新</span>' : `<span class="card-badge badge-date">${r.date.slice(5)}</span>`}
      </div>
      <div class="card-body">
        <ul class="card-preview">
          ${(r.preview && r.preview.length) ? r.preview.slice(0,5).map((p,j) => `<li><span class="rank">${j+1}</span>${p}</li>`).join('') : '<li style="color:var(--dim)">点击查看完整报告 →</li>'}
        </ul>
      </div>
      <div class="card-foot">
        <div class="card-tags">${(r.keywords||[]).slice(0,3).map(k => `<span class="tag">${k}</span>`).join('')}</div>
        <div class="card-action">查看 →</div>
      </div>
    </div>
  `).join('') + '</div>';
}

/* ── carousel ── */
function renderCarousel(container, reports) {
  currentIndex = 0;
  stopAutoPlay();
  container.innerHTML = `
    <div class="carousel-wrap">
      <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>
      <div class="carousel-nav">
        <button class="carousel-btn" onclick="carouselPrev()">◀</button>
        <div class="carousel-dots" id="carouselDots"></div>
        <div class="carousel-counter" id="carouselCounter">1 / ${reports.length}</div>
        <button class="carousel-btn" onclick="carouselNext()">▶</button>
      </div>
    </div>
  `;
  const track = document.getElementById('carouselTrack');
  track.innerHTML = reports.map((r, i) => `
    <div class="carousel-slide ${i === 0 ? 'active' : ''}" data-index="${i}">
      <div class="slide-content">
        <div class="slide-header">
          <div>
            <div class="slide-date">📊 ${r.date}</div>
            <div class="slide-time">${r.time} ${r.isNewest ? '<span class="slide-newest">● 最新</span>' : ''}</div>
          </div>
        </div>
        <div class="slide-body">
          <iframe src="${REPORTS_BASE}${r.filename}" loading="lazy" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
      </div>
    </div>
  `).join('');
  const dots = document.getElementById('carouselDots');
  dots.innerHTML = reports.map((_, i) => `<div class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="carouselGoTo(${i})"></div>`).join('');
  updateCounter();
  startAutoPlay();
}

function carouselGoTo(idx) {
  const slides = document.querySelectorAll('.carousel-slide');
  const dots = document.querySelectorAll('.carousel-dot');
  if (idx < 0) idx = slides.length - 1;
  if (idx >= slides.length) idx = 0;
  currentIndex = idx;
  slides.forEach((s, i) => {
    s.classList.toggle('active', i === idx);
  });
  dots.forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
  updateCounter();
  resetAutoPlay();
}

function updateCounter() {
  const counter = document.getElementById('carouselCounter');
  if (counter) {
    counter.textContent = `${currentIndex + 1} / ${document.querySelectorAll('.carousel-slide').length}`;
  }
}

function carouselPrev() { carouselGoTo(currentIndex - 1); }
function carouselNext() { carouselGoTo(currentIndex + 1); }

function startAutoPlay() {
  stopAutoPlay();
  autoPlayInterval = setInterval(() => carouselNext(), 8000);
}
function stopAutoPlay() {
  if (autoPlayInterval) {
    clearInterval(autoPlayInterval);
    autoPlayInterval = null;
  }
}
function resetAutoPlay() {
  stopAutoPlay();
  startAutoPlay();
}

/* ── timeline ── */
function renderTimeline(container, reports) {
  const grouped = {};
  reports.forEach(r => { (grouped[r.date] = grouped[r.date] || []).push(r); });
  container.innerHTML = '<div class="timeline">' + Object.entries(grouped).map(([date, items]) => `
    <div class="timeline-group">
      <div class="timeline-date-label">📅 ${date}</div>
      <div class="timeline-cards">
        ${items.map(r => `
          <div class="timeline-card" onclick="openReport('${r.filename}','${r.date} ${r.time}')">
            <div class="t-time">⏰ ${r.time} ${r.isNewest ? '● 最新' : ''}</div>
            <div class="t-preview">
              ${(r.preview||[]).slice(0,3).map(p => `<div class="t-preview-item">${p}</div>`).join('') || '<div class="t-preview-item">点击查看完整报告</div>'}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('') + '</div>';
}

/* ── modal ── */
function openReport(filename, title) {
  document.getElementById('modalTitle').textContent = title || '报告详情';
  document.getElementById('modalIframe').src = REPORTS_BASE + filename;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modalIframe').src = '';
  document.body.style.overflow = '';
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── keyboard nav for carousel ── */
document.addEventListener('keydown', e => {
  if (currentView !== 'carousel') return;
  if (e.key === 'ArrowLeft') carouselPrev();
  if (e.key === 'ArrowRight') carouselNext();
});

loadReports();
</script>
</body>
</html>
